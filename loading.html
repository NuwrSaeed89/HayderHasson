<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Loading | Haider Ahmad Hasson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&amp;family=Cairo:wght@400;600;700&amp;display=swap"/>
</head>
<body class="font-body selection:bg-secondary selection:text-white">

<div class="loader-screen" id="loader">
  <div class="text-center px-6">
    <p class="font-headline text-sm font-bold tracking-widest text-primary uppercase mb-1">Haider Ahmad Hasson</p>
    <p class="font-headline text-xs text-on-surface-variant mb-8">Mechanical &amp; Electrical</p>
  </div>
  <div class="loader-ring" aria-hidden="true">
    <svg viewBox="0 0 100 100">
      <circle class="loader-track" cx="50" cy="50" r="45"/>
      <circle class="loader-progress" cx="50" cy="50" r="45" id="progress-circle"/>
    </svg>
    <div class="loader-percent"><span id="progress-text">0%</span></div>
  </div>
  <p class="text-[11px] text-outline uppercase tracking-widest">Loading CV</p>
</div>

<script>
  (function () {
    var circle = document.getElementById('progress-circle');
    var text = document.getElementById('progress-text');
    var loader = document.getElementById('loader');
    var progress = 0;
    var circumference = 283;

    function setProgress(value) {
      progress = Math.min(100, Math.max(0, value));
      circle.style.strokeDashoffset = circumference - (circumference * progress / 100);
      text.textContent = Math.round(progress) + '%';
    }

    function finish() {
      setProgress(100);
      sessionStorage.setItem('cv-loaded', '1');
      setTimeout(function () {
        loader.classList.add('is-hidden');
        window.location.replace('index.html');
      }, 350);
    }

    setProgress(0);

    var images = ['index.html'];
    var preload = new Image();
    preload.src = 'images/11.jpeg';

    var tick = setInterval(function () {
      if (progress < 85) {
        setProgress(progress + Math.random() * 8 + 2);
      }
    }, 120);

    Promise.all([
      document.fonts ? document.fonts.ready : Promise.resolve(),
      new Promise(function (resolve) {
        if (preload.complete) resolve();
        else {
          preload.onload = resolve;
          preload.onerror = resolve;
        }
      }),
      fetch('css/styles.css').then(function () {}).catch(function () {})
    ]).then(function () {
      clearInterval(tick);
      var finishStep = setInterval(function () {
        if (progress >= 100) {
          clearInterval(finishStep);
          finish();
        } else {
          setProgress(progress + 4);
        }
      }, 40);
    });

    setTimeout(function () {
      clearInterval(tick);
      finish();
    }, 6000);
  })();
</script>
</body>
</html>
